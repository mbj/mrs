name: CI

on: push

env:
  RUST_BACKTRACE: full

jobs:
  build:
    strategy:
      matrix:
        os:
        - cargo_build_target: aarch64-apple-darwin
          version: macos-15
        - cargo_build_target: aarch64-unknown-linux-musl
          version: ubuntu-26.04-arm
        - cargo_build_target: aarch64-unknown-linux-gnu
          version: ubuntu-26.04-arm
        - cargo_build_target: x86_64-unknown-linux-musl
          version: ubuntu-26.04
        - cargo_build_target: x86_64-unknown-linux-gnu
          version: ubuntu-26.04
    name: Build (${{ matrix.os.cargo_build_target }})
    runs-on: ${{ matrix.os.version }}
    env:
      CARGO_BUILD_TARGET: ${{ matrix.os.cargo_build_target }}
    steps:
    - if: ${{ endsWith(matrix.os.cargo_build_target, '-musl') }}
      run: sudo apt-get update && sudo apt-get install --yes musl-tools
    - if: ${{ startsWith(matrix.os.version, 'ubuntu-') }}
      run: sudo apt-get update && sudo apt-get install --yes postgresql-client
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.rustup
        key: ${{ matrix.os.version }}-rustup-${{ matrix.os.cargo_build_target }}-${{ hashFiles('rust-toolchain.toml') }}
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/git/db/
          ~/.cargo/registry/cache/
          ~/.cargo/registry/index/
        key: ${{ matrix.os.version }}-cargo-${{ matrix.os.cargo_build_target }}-${{ hashFiles('.github/workflows/ci.yml', '**/Cargo.lock', 'rust-toolchain.toml') }}

    - name: Run fmt
      run: cargo --verbose fmt --check

    - name: Build all targets
      run: cargo --verbose build --all-targets --all-features --release

    # Run here to reuse the target/ from the build above; the test job has no
    # target/ cache and would recompile from scratch. Doctests only exercise
    # platform-independent Rust semantics, so run them on a single linux target:
    # rustdoc links each doctest as its own binary (pulling in the full aws-sdk
    # graph), and repeating that per-target — worst on macOS ld64 — is pure
    # redundant link time.
    - name: Run doctests
      if: ${{ matrix.os.cargo_build_target == 'x86_64-unknown-linux-gnu' }}
      run: cargo --verbose test --doc --all-features --release

    - name: Check for dirty repository
      run: git diff --exit-code

    - name: Run repository lint
      run: target/${{ matrix.os.cargo_build_target }}/release/manager repository-lint rust-version

    - name: Verify stratosphere generated code is committed
      run: target/${{ matrix.os.cargo_build_target }}/release/manager stratosphere sync --reject-dirty

    - name: Run clippy
      run: cargo --verbose clippy --all-features --all-targets --release

    - name: Install nextest
      uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
      with:
        tool: cargo-nextest

    # Compile the test binaries once here and archive them so the `test` lanes run
    # from the archive without recompiling. Copy the prebuilt manager binary to the
    # static, triple-free path referenced by archive.include in .config/nextest.toml
    # so it rides along in the archive for the pull-test-images setup script.
    - name: Build nextest archive
      run: |
        cp "target/${CARGO_BUILD_TARGET}/release/manager" target/pull-test-images-manager
        cargo --verbose nextest archive --all-features --release --archive-file nextest-archive.tar.zst

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: nextest-archive-${{ matrix.os.cargo_build_target }}
        path: nextest-archive.tar.zst
        retention-days: 1

    - name: Set up Ruby 3.4 for macOS gem build
      if: ${{ endsWith(matrix.os.cargo_build_target, '-darwin') }}
      uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1.307.0
      with:
        ruby-version: '3.4'

    - name: Verify pg-ephemeral generated files are committed
      run: target/${{ matrix.os.cargo_build_target }}/release/manager pg-ephemeral sync --reject-dirty

    - name: Build pg-ephemeral gem
      if: ${{ endsWith(matrix.os.cargo_build_target, '-musl') || endsWith(matrix.os.cargo_build_target, '-darwin') }}
      run: target/${{ matrix.os.cargo_build_target }}/release/manager pg-ephemeral ruby build --no-compile

    - name: Set up Node.js for npm package build
      if: ${{ endsWith(matrix.os.cargo_build_target, '-musl') || endsWith(matrix.os.cargo_build_target, '-darwin') }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'

    - name: Build pg-ephemeral npm package
      if: ${{ endsWith(matrix.os.cargo_build_target, '-musl') || endsWith(matrix.os.cargo_build_target, '-darwin') }}
      run: target/${{ matrix.os.cargo_build_target }}/release/manager pg-ephemeral npm build --no-compile

    - name: Upload build artifacts
      if: ${{ !endsWith(matrix.os.cargo_build_target, '-gnu') }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: pg-ephemeral-${{ matrix.os.cargo_build_target }}
        path: |
          dist/
          target/${{ matrix.os.cargo_build_target }}/release/manager
        retention-days: 7

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os:
        - cargo_build_target: aarch64-unknown-linux-musl
          version: ubuntu-26.04-arm
        - cargo_build_target: aarch64-unknown-linux-gnu
          version: ubuntu-26.04-arm
        - cargo_build_target: x86_64-unknown-linux-musl
          version: ubuntu-26.04
        - cargo_build_target: x86_64-unknown-linux-gnu
          version: ubuntu-26.04
        lane:
        - name: non-ociman
        - name: podman
        - name: docker
        # non-ociman tests also run on macOS; the ociman lanes are linux-only (they early-return on macOS).
        include:
        - os:
            cargo_build_target: aarch64-apple-darwin
            version: macos-15
          lane:
            name: non-ociman
    name: Test ${{ matrix.lane.name }} (${{ matrix.os.cargo_build_target }})
    runs-on: ${{ matrix.os.version }}
    env:
      CARGO_BUILD_TARGET: ${{ matrix.os.cargo_build_target }}
    steps:
    - if: ${{ endsWith(matrix.os.cargo_build_target, '-musl') }}
      run: sudo apt-get update && sudo apt-get install --yes musl-tools
    - if: ${{ matrix.lane.name == 'podman' || matrix.lane.name == 'docker' }}
      run: sudo apt-get update && sudo apt-get install --yes postgresql-client
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.rustup
        key: ${{ matrix.os.version }}-rustup-${{ matrix.os.cargo_build_target }}-${{ hashFiles('rust-toolchain.toml') }}
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/git/db/
          ~/.cargo/registry/cache/
          ~/.cargo/registry/index/
        key: ${{ matrix.os.version }}-cargo-${{ matrix.os.cargo_build_target }}-${{ hashFiles('.github/workflows/ci.yml', '**/Cargo.lock', 'rust-toolchain.toml') }}
    - name: Install nextest
      uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
      with:
        tool: cargo-nextest
    - name: Download nextest archive
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: nextest-archive-${{ matrix.os.cargo_build_target }}
    # Run from the prebuilt archive (no recompile). The pull-test-images setup script
    # (gated on rdeps(ociman)) runs the manager binary extracted from the archive via
    # MANAGER_PULL_BIN, so it never recompiles manager.
    - name: Run tests
      env:
        MANAGER_PULL_BIN: ${{ github.workspace }}/target/pull-test-images-manager
        LANE: ${{ matrix.lane.name }}
      run: |
        # Extract into the workspace so the archived binaries land at the
        # target/<triple>/release/... paths the tests baked into env!("CARGO_BIN_EXE_*") at build
        # time (build and test jobs share the same workspace path on GitHub runners).
        # --archive-file forbids cargo selection flags, so select tests with --filter-expr. The
        # podman lane serializes to dodge the buildah <1.44 --layers cache-probe TOCTOU.
        filter='rdeps(ociman)'
        threads=
        case "$LANE" in
          non-ociman) filter='not rdeps(ociman)' ;;
          podman) threads='--test-threads=1'; export OCIMAN_BACKEND=podman ;;
          docker) export OCIMAN_BACKEND=docker ;;
        esac
        cargo --verbose nextest run --archive-file nextest-archive.tar.zst --extract-to . --workspace-remap . --filter-expr "$filter" $threads

  ruby-integration-test:
    # Workaround for Bundler 4.x failing when attempting to install gems to the
    # system path on GitHub Actions Ubuntu runners. The runner's gem directory is
    # world-writable without the sticky bit, triggering Bundler's security check.
    # See: https://github.com/ruby/rubygems/issues/7983
    env:
      BUNDLE_PATH: vendor/bundle
    strategy:
      matrix:
        # ruby/setup-ruby has no prebuilt Ruby for ubuntu-26.04 (its
        # GitHubHostedPlatforms list stops at 24.04 as of v1.313.0), so 26.04 is
        # detected as self-hosted and the action fails. The rest of CI runs on
        # 26.04 for podman 5.x; these jobs only run the prebuilt static manager
        # binary against a Ruby env, so the OS version is irrelevant here. Pin to
        # 24.04 until upstream adds 26.04.
        platform:
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-musl
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
        - runner: macos-15
          target: aarch64-apple-darwin
        ruby-version:
        - '3.3'
        - '3.4'
        - '4.0'
    name: Ruby Integration Test (${{ matrix.platform.runner }}, Ruby ${{ matrix.ruby-version }})
    runs-on: ${{ matrix.platform.runner }}
    needs: build
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Install libpq-dev on Ubuntu
      if: ${{ startsWith(matrix.platform.runner, 'ubuntu-') }}
      run: sudo apt-get update && sudo apt-get install --yes libpq-dev

    - name: Download all artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: artifacts/
        merge-multiple: false

    - name: Set up Ruby
      uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1.307.0
      with:
        ruby-version: ${{ matrix.ruby-version }}

    - name: Make manager executable
      run: chmod +x artifacts/pg-ephemeral-${{ matrix.platform.target }}/target/${{ matrix.platform.target }}/release/manager

    - name: Merge multi-platform gems
      run: artifacts/pg-ephemeral-${{ matrix.platform.target }}/target/${{ matrix.platform.target }}/release/manager pg-ephemeral ruby merge-gems

    - name: Run integration tests with manager
      run: artifacts/pg-ephemeral-${{ matrix.platform.target }}/target/${{ matrix.platform.target }}/release/manager pg-ephemeral ruby test

  npm-integration-test:
    strategy:
      matrix:
        platform:
        - runner: ubuntu-26.04
          target: x86_64-unknown-linux-musl
        - runner: ubuntu-26.04-arm
          target: aarch64-unknown-linux-musl
        - runner: macos-15
          target: aarch64-apple-darwin
        node-version:
        - '22'
        - '24'
    name: npm Integration Test (${{ matrix.platform.runner }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.platform.runner }}
    needs: build
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: artifacts/
        merge-multiple: false

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ matrix.node-version }}

    - name: Make manager executable
      run: chmod +x artifacts/pg-ephemeral-${{ matrix.platform.target }}/target/${{ matrix.platform.target }}/release/manager

    - name: Merge npm packages
      run: artifacts/pg-ephemeral-${{ matrix.platform.target }}/target/${{ matrix.platform.target }}/release/manager pg-ephemeral npm merge

    - name: Run integration tests with manager
      run: artifacts/pg-ephemeral-${{ matrix.platform.target }}/target/${{ matrix.platform.target }}/release/manager pg-ephemeral npm test

  publish:
    name: Publish Edge Build
    needs:
    - build
    - test
    - ruby-integration-test
    - npm-integration-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: artifacts

    - name: Create edge build release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        chmod +x artifacts/pg-ephemeral-x86_64-unknown-linux-musl/target/x86_64-unknown-linux-musl/release/manager
        artifacts/pg-ephemeral-x86_64-unknown-linux-musl/target/x86_64-unknown-linux-musl/release/manager release create-edge
