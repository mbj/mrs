image = "17"

# pg_cron requires `shared_preload_libraries` to be set before PostgreSQL
# starts. We declare it as a server parameter; pg-ephemeral injects it as
# a `-c shared_preload_libraries=pg_cron` flag on the postgres command.
[instances.main.parameters]
shared_preload_libraries = "pg_cron"

# Runs INSIDE the container, with PostgreSQL stopped. Installs the pg_cron
# Debian package so the shared library file is present at the path PG
# expects when it loads `shared_preload_libraries`.
[instances.main.seeds.install-pg-cron]
type = "container-script"
script = "apt-get update && apt-get install --yes --no-install-recommends postgresql-17-cron"

# Runs on the HOST after PostgreSQL is up. CREATE EXTENSION needs the
# shared library to be loaded, which happens because we set
# `shared_preload_libraries` above.
[instances.main.seeds.enable-pg-cron]
type = "script"
script = 'psql --single-transaction --set ON_ERROR_STOP=1 --command "CREATE EXTENSION pg_cron"'

# Demonstrate that pg_cron is actually usable.
[instances.main.seeds.schedule-job]
type = "sql-statement"
statement = """
SELECT cron.schedule('cleanup', '0 3 * * *', 'DELETE FROM events WHERE occurred < now() - interval ''30 days''');
"""
