# Allowed duplicate crate versions for clippy::multiple_crate_versions lint
#
# These duplicates are caused by transitive dependencies that cannot be
# resolved without waiting for upstream crates to update their dependencies.

allowed-duplicate-crates = [
    # AWS SDK still uses http 0.2 internally, while reqwest/hyper use http 1.x
    # Source: aws-smithy-* crates depend on http 0.2, our direct deps use http 1.x
    # Tracking: https://github.com/awslabs/aws-sdk-rust/issues/977
    "http",
    "http-body",

    # serde_with 3.x (transitive from google-cloud-sql-v1) depends on indexmap 1.9
    # and schemars 0.9, while the rest of the workspace uses indexmap 2.x and schemars 1.x
    "indexmap",
    "schemars",

    # foldhash 0.1 vs 0.2, pulled by different hashbrown versions across the tree
    "foldhash",

    # rand 0.8/0.9/0.10 coexist: sqlx (upstream) uses rand 0.8, other deps use 0.9,
    # pg-ephemeral uses rand 0.10
    "rand",
    "rand_core",
    "rand_chacha",

    # getrandom 0.2 (ring/rand 0.8) vs 0.3 vs 0.4 (rand 0.10)
    "getrandom",

    # rand 0.10 -> chacha20 -> cpufeatures 0.3, while aes/sha2 use cpufeatures 0.2
    "cpufeatures",

    # sha2 0.11 (direct dep) vs 0.10 (transitive from aws-sdk, google-cloud, msqlx)
    # Also causes duplicate digest, crypto-common, block-buffer, const-oid
    "sha2",
    "digest",
    "crypto-common",
    "block-buffer",
    "const-oid",

    # We use nom 8 while parts of the ecosystem still depend on nom 7
    "nom",

    # libredox requires redox_syscall 0.7, while other crates still use 0.5
    "redox_syscall",

    # getrandom 0.3 -> r-efi 5.x / wit-bindgen 0.57, getrandom 0.4 -> r-efi 6.x /
    # wit-bindgen 0.51. WASI/UEFI-target-only deps, not built on Linux.
    "r-efi",
    "wit-bindgen",

    # windows-sys 0.52/0.59/0.61 pulled by various deps (tokio, rustls, aws-sdk, zip)
    # targeting different Windows APIs. Platform-specific, does not affect Linux builds.
    "windows-sys",
]
